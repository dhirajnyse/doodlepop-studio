<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" role="img" aria-labelledby="title desc">
  <title id="title">DoodlePop Studio logo</title>
  <desc id="desc">A colorful 3D wordmark with a paint pencil badge.</desc>
  <defs>
    <linearGradient id="badgePaint" x1="66" x2="238" y1="244" y2="54" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06d6a0" />
      <stop offset=".42" stop-color="#ffd166" />
      <stop offset="1" stop-color="#ed254e" />
    </linearGradient>
    <linearGradient id="letterGradient" x1="280" x2="820" y1="72" y2="205" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ed254e" />
      <stop offset=".2" stop-color="#ff9f1c" />
      <stop offset=".43" stop-color="#ffd166" />
      <stop offset=".65" stop-color="#06d6a0" />
      <stop offset=".83" stop-color="#118ab2" />
      <stop offset="1" stop-color="#7b2cbf" />
    </linearGradient>
    <filter id="softShadow" x="-15%" y="-20%" width="130%" height="145%">
      <feDropShadow dx="0" dy="15" stdDeviation="7" flood-color="#25252d" flood-opacity=".22" />
    </filter>
  </defs>
  <rect width="900" height="300" rx="52" fill="#fffdf7" />
  <circle cx="105" cy="72" r="20" fill="#ffd166" opacity=".55" />
  <circle cx="806" cy="62" r="26" fill="#38bdf8" opacity=".28" />
  <circle cx="824" cy="242" r="18" fill="#fb6f92" opacity=".34" />
  <g filter="url(#softShadow)">
    <path d="M81 213 42 252l76-21L244 105l-37-37L81 213Z" fill="url(#badgePaint)" stroke="#25252d" stroke-width="15" stroke-linejoin="round" />
    <path d="m204 65 24-24 34 34-24 24" fill="#38bdf8" stroke="#25252d" stroke-width="15" stroke-linejoin="round" />
    <path d="M91 201c33 9 55 32 62 63" fill="none" stroke="#25252d" stroke-width="16" stroke-linecap="round" />
  </g>
  <g font-family="Arial Rounded MT Bold, Arial, sans-serif" font-size="96" font-weight="900" letter-spacing="0" filter="url(#softShadow)">
    <text x="286" y="158" fill="#25252d" opacity=".18">DoodlePop</text>
    <text x="278" y="148" fill="url(#letterGradient)" stroke="#25252d" stroke-width="5" paint-order="stroke fill">DoodlePop</text>
    <text x="284" y="224" fill="#064e3b" font-size="38" letter-spacing="10">STUDIO</text>
  </g>
</svg>
