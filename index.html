<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DoodlePop Studio</title>
    <meta
      name="description"
      content="DoodlePop Studio is a playful browser painting app for kids with drawing tools, coloring pages, upload-to-paint, stamps, and PNG export."
    />
    <meta name="theme-color" content="#ff9f1c" />
    <meta property="og:title" content="DoodlePop Studio" />
    <meta property="og:description" content="A bright browser painting studio for kids." />
    <meta property="og:type" content="website" />
    <link rel="icon" href="assets/doodlepop-logo.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="paint-app" aria-label="DoodlePop Studio">
      <header class="app-header">
        <div class="brand" aria-label="DoodlePop Studio">
          <span class="brand-badge" aria-hidden="true">
            <svg viewBox="0 0 64 64">
              <defs>
                <linearGradient id="badgePaint" x1="9" x2="53" y1="55" y2="8" gradientUnits="userSpaceOnUse">
                  <stop stop-color="#06d6a0" />
                  <stop offset=".45" stop-color="#ffd166" />
                  <stop offset="1" stop-color="#ed254e" />
                </linearGradient>
              </defs>
              <path d="M16 47 8 55l16-4 28-28-8-8-28 32Z" fill="url(#badgePaint)" stroke="#25252d" stroke-width="4" stroke-linejoin="round" />
              <path d="m43 14 5-5 7 7-5 5" fill="#38bdf8" stroke="#25252d" stroke-width="4" stroke-linejoin="round" />
              <path d="M18 44c7 2 11 6 13 12" fill="none" stroke="#25252d" stroke-width="4" stroke-linecap="round" />
            </svg>
          </span>
          <div class="brand-copy">
            <h1 class="wordmark" aria-label="DoodlePop">
              <span style="--i:0">D</span><span style="--i:1">o</span><span style="--i:2">o</span><span style="--i:3">d</span><span style="--i:4">l</span><span style="--i:5">e</span><span style="--i:6">P</span><span style="--i:7">o</span><span style="--i:8">p</span>
            </h1>
            <p>Studio</p>
          </div>
        </div>

        <nav class="mode-tabs" aria-label="Workspace modes">
          <button class="mode-tab is-active" type="button" data-mode="paint">Paint</button>
          <button class="mode-tab" type="button" data-mode="color">Coloring</button>
          <button class="mode-tab" type="button" data-mode="upload">Upload</button>
        </nav>

        <div class="header-actions" aria-label="Painting actions">
          <button class="header-button" type="button" id="undoButton" aria-label="Undo" title="Undo">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M9 7 4 12l5 5" />
              <path d="M5 12h9a6 6 0 0 1 6 6v1" />
            </svg>
          </button>
          <button class="header-button" type="button" id="redoButton" aria-label="Redo" title="Redo">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m15 7 5 5-5 5" />
              <path d="M19 12h-9a6 6 0 0 0-6 6v1" />
            </svg>
          </button>
          <button class="header-button danger" type="button" id="clearButton" aria-label="New blank page" title="New blank page">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 7h16" />
              <path d="M10 11v6" />
              <path d="M14 11v6" />
              <path d="M6 7l1 14h10l1-14" />
              <path d="M9 7V4h6v3" />
            </svg>
          </button>
          <button class="save-button" type="button" id="saveButton">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3v12" />
              <path d="m7 10 5 5 5-5" />
              <path d="M5 20h14" />
            </svg>
            <span>Save</span>
          </button>
        </div>
      </header>

      <section class="studio-shell">
        <aside class="tool-rail" aria-label="Painting tools">
          <button class="tool-button is-active" type="button" data-tool="brush" aria-label="Brush" title="Brush">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M14 4.5 19.5 10 9 20.5c-1.9 1.9-5.5 1.4-5.5 1.4S3 18.3 4.9 16.4L14 4.5Z" />
              <path d="M15.5 3 21 8.5" />
              <path d="M5.5 15.8 9.7 20" />
            </svg>
          </button>
          <button class="tool-button" type="button" data-tool="bucket" aria-label="Fill" title="Fill">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m4 13 8-8 8 8" />
              <path d="M5 14h14l-5 6H10l-5-6Z" />
              <path d="M19 19c0-1.7 2-3.3 2-3.3S23 17.3 23 19a2 2 0 0 1-4 0Z" />
            </svg>
          </button>
          <button class="tool-button" type="button" data-tool="eraser" aria-label="Eraser" title="Eraser">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m7 21-4-4 10-10 6 6-8 8H7Z" />
              <path d="m14 7 3-3 4 4-3 3" />
              <path d="M11 21h10" />
            </svg>
          </button>
          <button class="tool-button" type="button" data-tool="sprinkle" aria-label="Sprinkle" title="Sprinkle">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="7" cy="7" r="2" />
              <circle cx="17" cy="6" r="1.6" />
              <circle cx="15" cy="16" r="2.4" />
              <circle cx="6" cy="18" r="1.4" />
            </svg>
          </button>

          <div class="rail-divider" aria-hidden="true"></div>

          <button class="stamp-button" type="button" data-stamp="star" aria-label="Star stamp" title="Star stamp">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m12 3 2.7 5.6 6.1.9-4.4 4.3 1 6.1-5.4-2.9-5.4 2.9 1-6.1-4.4-4.3 6.1-.9L12 3Z" />
            </svg>
          </button>
          <button class="stamp-button" type="button" data-stamp="heart" aria-label="Heart stamp" title="Heart stamp">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 20s-8-4.9-8-11a4.5 4.5 0 0 1 8-2.8A4.5 4.5 0 0 1 20 9c0 6.1-8 11-8 11Z" />
            </svg>
          </button>
          <button class="stamp-button" type="button" data-stamp="flower" aria-label="Flower stamp" title="Flower stamp">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="2.5" />
              <circle cx="12" cy="5.8" r="3" />
              <circle cx="18" cy="10.4" r="3" />
              <circle cx="15.7" cy="17.4" r="3" />
              <circle cx="8.3" cy="17.4" r="3" />
              <circle cx="6" cy="10.4" r="3" />
            </svg>
          </button>
        </aside>

        <aside class="library-panel" aria-label="Image library">
          <div class="library-heading">
            <h2>Image Library</h2>
            <span>8 picks</span>
          </div>
          <div class="activity-strip" aria-label="Quick starts">
            <button class="activity-card blank-card" type="button" data-action="blank">
              <span class="activity-icon" aria-hidden="true">
                <svg viewBox="0 0 64 64">
                  <rect x="12" y="8" width="40" height="48" rx="6" fill="#fffdf7" stroke="#25252d" stroke-width="3" />
                  <path d="M21 22h22M21 32h22M21 42h14" stroke="#d3cdc0" stroke-width="4" stroke-linecap="round" />
                </svg>
              </span>
              <span>Blank</span>
            </button>
            <button class="activity-card" type="button" data-template="rocket">
              <span class="activity-icon" aria-hidden="true">
                <svg viewBox="0 0 64 64">
                  <path d="M33 8c10 8 13 20 8 34l-19 5C20 30 23 18 33 8Z" fill="#ffffff" stroke="#25252d" stroke-width="3" />
                  <circle cx="34" cy="23" r="5" fill="#93e7ff" stroke="#25252d" stroke-width="3" />
                  <path d="M22 41 12 52l13-3M41 37l11 5-10 7" fill="#ffd166" stroke="#25252d" stroke-width="3" />
                </svg>
              </span>
              <span>Rocket</span>
            </button>
            <button class="activity-card" type="button" data-template="castle">
              <span class="activity-icon" aria-hidden="true">
                <svg viewBox="0 0 64 64">
                  <path d="M14 27h36v28H14V27Z" fill="#fffdf7" stroke="#25252d" stroke-width="3" />
                  <path d="M18 13h10v14H18V13Zm18 0h10v14H36V13Z" fill="#ffd166" stroke="#25252d" stroke-width="3" />
                  <path d="M27 55V43a5 5 0 0 1 10 0v12" fill="#ff9f1c" stroke="#25252d" stroke-width="3" />
                </svg>
              </span>
              <span>Castle</span>
            </button>
            <button class="activity-card" type="button" data-template="sea">
              <span class="activity-icon" aria-hidden="true">
                <svg viewBox="0 0 64 64">
                  <path d="M12 36c9-12 24-12 36 0-12 12-27 12-36 0Z" fill="#ffffff" stroke="#25252d" stroke-width="3" />
                  <path d="M48 36 58 27v18l-10-9Z" fill="#ffd166" stroke="#25252d" stroke-width="3" />
                  <circle cx="26" cy="34" r="2.5" fill="#25252d" />
                  <path d="M9 49c7-4 13-4 20 0s13 4 20 0" fill="none" stroke="#38bdf8" stroke-width="4" stroke-linecap="round" />
                </svg>
              </span>
              <span>Sea</span>
            </button>
            <button class="activity-card" type="button" data-template="dino">
              <span class="activity-icon" aria-hidden="true">
                <svg viewBox="0 0 64 64">
                  <path d="M11 39c7-16 21-22 34-15 8 4 11 12 6 19-5 8-19 8-30 3l-8 6-2-13Z" fill="#ffffff" stroke="#25252d" stroke-width="3" stroke-linejoin="round" />
                  <path d="M40 22 43 11l7 10" fill="#ffd166" stroke="#25252d" stroke-width="3" stroke-linejoin="round" />
                  <circle cx="42" cy="32" r="2.5" fill="#25252d" />
                  <path d="M24 47v8M36 48v8" stroke="#25252d" stroke-width="3" stroke-linecap="round" />
                </svg>
              </span>
              <span>Dino</span>
            </button>
            <button class="activity-card" type="button" data-template="garden">
              <span class="activity-icon" aria-hidden="true">
                <svg viewBox="0 0 64 64">
                  <circle cx="20" cy="24" r="8" fill="#ffffff" stroke="#25252d" stroke-width="3" />
                  <circle cx="32" cy="18" r="8" fill="#ffffff" stroke="#25252d" stroke-width="3" />
                  <circle cx="44" cy="24" r="8" fill="#ffffff" stroke="#25252d" stroke-width="3" />
                  <circle cx="32" cy="30" r="8" fill="#ffd166" stroke="#25252d" stroke-width="3" />
                  <path d="M32 38v16M20 54h24" stroke="#06d6a0" stroke-width="4" stroke-linecap="round" />
                </svg>
              </span>
              <span>Garden</span>
            </button>
            <button class="activity-card" type="button" data-template="robot">
              <span class="activity-icon" aria-hidden="true">
                <svg viewBox="0 0 64 64">
                  <rect x="16" y="19" width="32" height="32" rx="6" fill="#ffffff" stroke="#25252d" stroke-width="3" />
                  <path d="M32 19V9M24 9h16" stroke="#25252d" stroke-width="3" stroke-linecap="round" />
                  <circle cx="26" cy="33" r="3" fill="#38bdf8" stroke="#25252d" stroke-width="3" />
                  <circle cx="38" cy="33" r="3" fill="#38bdf8" stroke="#25252d" stroke-width="3" />
                  <path d="M25 43h14M10 34h6M48 34h6" stroke="#25252d" stroke-width="3" stroke-linecap="round" />
                </svg>
              </span>
              <span>Robot</span>
            </button>
            <button class="activity-card" type="button" data-template="butterfly">
              <span class="activity-icon" aria-hidden="true">
                <svg viewBox="0 0 64 64">
                  <path d="M30 31C14 9 5 25 13 38c5 9 15 5 17-7Z" fill="#ffffff" stroke="#25252d" stroke-width="3" />
                  <path d="M34 31C50 9 59 25 51 38c-5 9-15 5-17-7Z" fill="#ffffff" stroke="#25252d" stroke-width="3" />
                  <path d="M32 27v24" stroke="#25252d" stroke-width="4" stroke-linecap="round" />
                  <circle cx="32" cy="21" r="5" fill="#ffd166" stroke="#25252d" stroke-width="3" />
                </svg>
              </span>
              <span>Butterfly</span>
            </button>
            <label class="activity-card upload-card" for="uploadInput">
              <span class="activity-icon" aria-hidden="true">
                <svg viewBox="0 0 64 64">
                  <path d="M12 46V18a6 6 0 0 1 6-6h28a6 6 0 0 1 6 6v28a6 6 0 0 1-6 6H18a6 6 0 0 1-6-6Z" fill="#fffdf7" stroke="#25252d" stroke-width="3" />
                  <path d="M22 41 31 30l7 8 4-5 8 8" fill="none" stroke="#06d6a0" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
                  <path d="M32 28V14m0 0-6 6m6-6 6 6" stroke="#ed254e" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
              </span>
              <span>Upload</span>
            </label>
            <input id="uploadInput" type="file" accept="image/png,image/jpeg,image/webp,image/svg+xml" />
          </div>
        </aside>

        <section class="canvas-zone" aria-label="Painting canvas area">
          <div class="canvas-frame">
            <canvas id="paintCanvas" width="1280" height="820" aria-label="Painting canvas"></canvas>
          </div>
        </section>

        <aside class="side-panel" aria-label="Paint settings">
          <section class="panel-section">
            <div class="panel-heading">
              <h2>Colors</h2>
              <label class="custom-color" title="Custom color" aria-label="Custom color">
                <input id="customColor" type="color" value="#ed254e" />
              </label>
            </div>
            <div class="palette" aria-label="Color palette">
              <button class="swatch is-selected" type="button" style="--swatch: #ed254e" data-color="#ed254e" aria-label="Red"></button>
              <button class="swatch" type="button" style="--swatch: #ff9f1c" data-color="#ff9f1c" aria-label="Orange"></button>
              <button class="swatch" type="button" style="--swatch: #ffd166" data-color="#ffd166" aria-label="Yellow"></button>
              <button class="swatch" type="button" style="--swatch: #06d6a0" data-color="#06d6a0" aria-label="Green"></button>
              <button class="swatch" type="button" style="--swatch: #118ab2" data-color="#118ab2" aria-label="Blue"></button>
              <button class="swatch" type="button" style="--swatch: #7b2cbf" data-color="#7b2cbf" aria-label="Violet"></button>
              <button class="swatch" type="button" style="--swatch: #fb6f92" data-color="#fb6f92" aria-label="Pink"></button>
              <button class="swatch" type="button" style="--swatch: #242423" data-color="#242423" aria-label="Black"></button>
              <button class="swatch" type="button" style="--swatch: #ffffff" data-color="#ffffff" aria-label="White"></button>
            </div>
          </section>

          <section class="panel-section">
            <div class="panel-heading">
              <h2>Brush</h2>
              <span id="sizePreview" aria-hidden="true"></span>
            </div>
            <input id="brushSize" type="range" min="4" max="78" value="18" aria-label="Brush size" />
          </section>

          <section class="panel-section import-panel">
            <div class="panel-heading">
              <h2>My Drawing</h2>
              <span class="status-pill" id="uploadStatus">Ready</span>
            </div>
            <label class="upload-drop" for="uploadInput">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 15V4" />
                <path d="m7 9 5-5 5 5" />
                <path d="M5 20h14" />
              </svg>
              <span>Choose Image</span>
            </label>
          </section>
        </aside>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
